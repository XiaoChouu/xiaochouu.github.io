<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaoChou's website steer</title>
    <link rel="icon" href="https://xiaochouu.github.io/home/xtf.png">
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .background {
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .heading {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .button-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
        }
        .button {
            background-color: #0f12d8;
            border: none;
            color: white;
            padding: 20px 50px;
            text-align: center;
            text-decoration: none;
            font-size: 24px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #00c3ff;
        }
        .link {
            color: rgb(0, 0, 0);
            text-decoration: none; /* 去除下划线 */
            cursor: pointer;
        }
        @keyframes wave {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .playground {
            font-size: 2em;
            color: black;
            animation: wave 1s infinite;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="heading"><h2>Welcome to xiaochouu.github.io</h2></div>
        <div class="button-container">
            <a href="https://xiaochouu.github.io/acdove/" class="button">蛋仔派对赛季视频下载</a>
            <a href="https://www.douyin.com/user/MS4wLjABAAAAIlnCToTNn3w5gYQstjAQhAvhaMbsyusIm_v-ygg8csI?from_tab_name=main" class="button">本人の抖音号</a>
        </div>
        <span class="link" onclick="openWebsite()">如果访问不了、下载速度慢、加载异常，可以点击此处下载加速器。（点击打开加速器官网）</span>
        
        <script>
            function openWebsite() {
                try {
                    window.open('https://steampp.net/', '_blank');
                } catch (err) {
                    console.error('打开网站时发生错误:', err);
                    alert('无法打开加速器官网，请检查您的网络连接。');
                }
            }
        </script>
        
        <br>
